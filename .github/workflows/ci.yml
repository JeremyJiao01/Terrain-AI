name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CGB_WORKSPACE: /tmp/cgb-test

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e ".[treesitter-full]"
          pip install pytest

      - name: Run layer dependency check
        run: python tools/dep_check.py

      - name: Run tests
        run: |
          python -m pytest code_graph_builder/tests/ -v --tb=short -x \
            --ignore=code_graph_builder/tests/domains/upper/test_api_find_integration.py \
            --ignore=code_graph_builder/tests/domains/core/test_step3_embedding.py \
            --ignore=code_graph_builder/tests/domains/core/test_embedder.py \
            --ignore=code_graph_builder/tests/domains/core/test_integration_semantic.py \
            --ignore=code_graph_builder/tests/entrypoints/test_mcp_user_flow.py
